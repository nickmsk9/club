server {
    listen 80;
    server_name localhost;

    root /var/www/html;
    index index.php index.html;

  # Блокировка доступа к .htaccess и другим скрытым файлам
    location ~ /\.ht {
        deny all;
    }

    # Отключение листинга директорий (аналог Options -Indexes)
    autoindex off;

    # Разрешение симлинков (аналог Options +FollowSymLinks)
    disable_symlinks off;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM обработка
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # Передача PHP-настроек через fastcgi_param
        fastcgi_param PHP_VALUE "display_errors=On \n magic_quotes_gpc=Off";
    }

    ### Кастомные rewrite-правила ###
    rewrite ^/index/page([^_]*)$ /index.php?page=$1 last;

    rewrite ^/torrentbar/bar.php/([^/]*)\.png$ /torrentbar/bar.php?id=$1 last;

    rewrite ^/details/id([^/]*)/?$ /details.php?id=$1 last;
    rewrite ^/details/id([^/]*)&page=([^/]*)$ /details.php?id=$1&page=$2 last;

    rewrite ^/user/id([^/]*)$ /userdetails.php?id=$1 last;
    rewrite ^/name/([^/]*)$ /userdetails2.php?name=$1 last;

    rewrite ^/forum/?$ /forum.php last;
    rewrite ^/forum/view/topic/id([^/]*)$ /forum.php?action=viewtopic&topicid=$1 last;
    rewrite ^/forum/view/forum/id([^/]*)$ /forum.php?action=viewforum&forumid=$1 last;
    rewrite ^/forum/view/forid/id([^/]*)$ /forum.php?action=forumview&forid=$1 last;

    rewrite ^/go/([^/]*)$ /redirector.php?url=$1 last;

    rewrite ^/browse/?$ /browse.php last;
    rewrite ^/browse/cat([^/]*)$ /browse.php?cat=$1 last;
    rewrite ^/browse/all([^/]*)$ /browse.php?all=$1 last;

    rewrite ^/page-id-([^-]*)\.piska$ /pagep.php?id=$1 last;

    # Обработка 404 ошибки
    error_page 404 /404.php;
}